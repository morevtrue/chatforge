services:

  # ─── База данных ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chatforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chatforge_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatforge} -d ${POSTGRES_DB:-chatforge_prod}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Кеш ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatforge_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Файловое хранилище ────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: chatforge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - internal
      - traefik_public
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # MinIO S3 API
      - "traefik.http.routers.chatforge-minio.rule=Host(`minio.${DOMAIN:?DOMAIN is required}`)"
      - "traefik.http.routers.chatforge-minio.entrypoints=websecure"
      - "traefik.http.routers.chatforge-minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chatforge-minio.service=chatforge-minio"
      - "traefik.http.services.chatforge-minio.loadbalancer.server.port=9000"
      # MinIO Console
      - "traefik.http.routers.chatforge-minio-console.rule=Host(`minio-console.${DOMAIN}`)"
      - "traefik.http.routers.chatforge-minio-console.entrypoints=websecure"
      - "traefik.http.routers.chatforge-minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chatforge-minio-console.service=chatforge-minio-console"
      - "traefik.http.services.chatforge-minio-console.loadbalancer.server.port=9001"

  # ─── Backend (Elixir release) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatforge_backend
    restart: unless-stopped
    environment:
      MIX_ENV: prod
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatforge}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-chatforge_prod}
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
      GUARDIAN_SECRET_KEY: ${GUARDIAN_SECRET_KEY:?GUARDIAN_SECRET_KEY is required}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_HOST: minio
      S3_PORT: "9000"
      S3_SCHEME: "http://"
      S3_BUCKET: ${MINIO_BUCKET:-chatforge}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://minio.${DOMAIN}}
      CORS_ORIGINS: https://${DOMAIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      CHAT_BASE_URL: https://${DOMAIN}
      PORT: "4000"
      DB_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - traefik_public
    command: >
      sh -c "bin/chatforge eval 'ChatForge.Release.migrate()' &&
             bin/chatforge eval 'ChatForge.Release.seed()' &&
             bin/chatforge start"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # API и WebSocket — приоритет выше
      - "traefik.http.routers.chatforge-backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/socket`))"
      - "traefik.http.routers.chatforge-backend.entrypoints=websecure"
      - "traefik.http.routers.chatforge-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chatforge-backend.priority=10"
      - "traefik.http.services.chatforge-backend.loadbalancer.server.port=4000"

  # ─── Frontend (nginx статика) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CHAT_BASE_URL: ${VITE_CHAT_BASE_URL:-https://${DOMAIN}/?subdomain={subdomain}}
    container_name: chatforge_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # Все остальные запросы → frontend
      - "traefik.http.routers.chatforge-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.chatforge-frontend.entrypoints=websecure"
      - "traefik.http.routers.chatforge-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.chatforge-frontend.priority=1"
      - "traefik.http.services.chatforge-frontend.loadbalancer.server.port=80"

networks:
  # Внутренняя сеть — БД и Redis не торчат наружу
  internal:
    driver: bridge
  # Внешняя сеть Traefik — общая для всех проектов на сервере
  traefik_public:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
