services:

  # ─── Reverse proxy ─────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: chatforge_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt (ACME) — автоматический TLS
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # HTTP → HTTPS редирект
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    labels:
      - "traefik.enable=true"
      # Dashboard (опционально, закрыть в prod или добавить auth)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:?DOMAIN is required}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"

  # ─── База данных ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chatforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chatforge_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatforge} -d ${POSTGRES_DB:-chatforge_prod}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Кеш ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatforge_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Файловое хранилище ────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: chatforge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      # MinIO S3 API — доступен через поддомен minio.yourdomain.com
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio.service=minio"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      # MinIO Console
      - "traefik.http.routers.minio-console.rule=Host(`minio-console.${DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # ─── Backend (Elixir release) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatforge_backend
    restart: unless-stopped
    environment:
      MIX_ENV: prod
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatforge}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-chatforge_prod}
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
      GUARDIAN_SECRET_KEY: ${GUARDIAN_SECRET_KEY:?GUARDIAN_SECRET_KEY is required}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_HOST: minio
      S3_PORT: "9000"
      S3_SCHEME: "http://"
      S3_BUCKET: ${MINIO_BUCKET:-chatforge}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://minio.${DOMAIN}}
      CORS_ORIGINS: https://${DOMAIN},https://*.${DOMAIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      CHAT_BASE_URL: https://${DOMAIN}
      PORT: "4000"
      DB_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "bin/chatforge eval 'ChatForge.Release.migrate()' &&
             bin/chatforge eval 'ChatForge.Release.seed()' &&
             bin/chatforge start"
    labels:
      - "traefik.enable=true"
      # API роуты — приоритет выше чем у frontend
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/socket`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=4000"
      # WebSocket upgrade
      - "traefik.http.middlewares.ws-headers.headers.customrequestheaders.Upgrade=websocket"
      - "traefik.http.middlewares.ws-headers.headers.customrequestheaders.Connection=Upgrade"
      - "traefik.http.routers.backend.middlewares=ws-headers"

  # ─── Frontend (nginx статика) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CHAT_BASE_URL: ${VITE_CHAT_BASE_URL:-https://${DOMAIN}/?subdomain={subdomain}}
    container_name: chatforge_frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      # Все остальные запросы → frontend (приоритет ниже)
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  letsencrypt_data:
